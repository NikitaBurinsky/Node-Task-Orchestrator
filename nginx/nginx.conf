events {
    worker_connections 1024;
}

http {
    # Basic anti-abuse limits per source IP.
    limit_req_zone $binary_remote_addr zone=api_per_ip:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=auth_per_ip:10m rate=10r/m;
    limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

    server {
        listen 80;
        server_name api.nto.formatis.online;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name api.nto.formatis.online;

        ssl_certificate /etc/letsencrypt/live/api.nto.formatis.online/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.nto.formatis.online/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location = /api {
            return 301 /api/;
        }

        location /api/auth/ {
            limit_req zone=auth_per_ip burst=20 nodelay;
            limit_conn conn_per_ip 20;

            proxy_pass http://nto-backend:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/ {
            limit_req zone=api_per_ip burst=50 nodelay;
            limit_conn conn_per_ip 50;

            proxy_pass http://nto-backend:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Drop non-API probing traffic quickly.
        location / {
            return 444;
        }
    }
}
