name: Deploy PostgreSQL DB (VPS)

on:
  workflow_dispatch:

jobs:
  deploy-postgres:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy DB to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          port: 22
          script: |
            # === НАСТРОЙКИ ИЗ application.properties ===
            CONTAINER_NAME="nto_db_container"
            DB_NAME=${{ secrets.DB_NAME }}
            DB_USER="postgres"
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            HOST_PORT="5400"
            VOLUME_NAME="nto_pg_data"

            echo "Начинаем развертывание PostgreSQL..."

            docker volume create $VOLUME_NAME

            echo "Проверка существующих контейнеров..."
            if [ "$(docker ps -aq -f name=$CONTAINER_NAME)" ]; then
                echo "Остановка и удаление старого контейнера $CONTAINER_NAME..."
                docker rm -f $CONTAINER_NAME
            fi

            echo "Запуск PostgreSQL..."
            docker run -d \
              --name $CONTAINER_NAME \
              -p $HOST_PORT:5432 \
              -e POSTGRES_DB=$DB_NAME \
              -e POSTGRES_USER=$DB_USER \
              -e POSTGRES_PASSWORD=$DB_PASSWORD \
              -v $VOLUME_NAME:/var/lib/postgresql/data \
              --restart unless-stopped \
              postgres:15-alpine

            echo "Waiting for PostgreSQL to become ready..."
            until docker exec $CONTAINER_NAME pg_isready -U $DB_USER -d $DB_NAME > /dev/null 2>&1; do
              sleep 2
            done

            echo "Ensuring task_status enum exists..."
            docker exec $CONTAINER_NAME psql -U $DB_USER -d $DB_NAME -v ON_ERROR_STOP=1 -c \
              "DO \$\$ BEGIN CREATE TYPE task_status AS ENUM ('PENDING','RUNNING','SUCCESS','FAILED','CANCELLED'); EXCEPTION WHEN duplicate_object THEN NULL; END \$\$;"

            echo "✅ База данных успешно запущена!"
            echo "Доступна по адресу: jdbc:postgresql://$VPS_HOST:$HOST_PORT/$DB_NAME"
